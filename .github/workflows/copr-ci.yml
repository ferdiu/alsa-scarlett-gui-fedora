---
# .github/workflows/copr-ci.yml
#
# Monitors three upstream projects for new releases and triggers a COPR build
# for each package when a newer version is available than what is currently
# in the ferdiu/alsa-scarlett-gui COPR project.
#
# Upstreams tracked:
#   alsa-scarlett-gui  — https://github.com/geoffreybennett/alsa-scarlett-gui
#   scarlett2-firmware — https://github.com/geoffreybennett/scarlett2-firmware
#   scarlett4-firmware — https://github.com/geoffreybennett/scarlett4-firmware
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   COPR_BUILD_L  — copr-cli login    (from https://copr.fedorainfracloud.org/api)
#   COPR_BUILD_T  — copr-cli token    (from https://copr.fedorainfracloud.org/api)
#
# The copr-cli config section name must be "copr-cli" (default).
# Download your token config from https://copr.fedorainfracloud.org/api and
# split the login and token values into the two secrets above.

name: COPR CI build

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily — after most upstream release windows
  workflow_dispatch:        # allow manual trigger from the Actions tab

env:
  COPR_USERNAME:    ferdiu
  COPR_PROJECT:     alsa-scarlett-gui
  COPR_URL:         https://copr.fedorainfracloud.org
  GIT_USER_NAME:    ferdiu
  GIT_USER_EMAIL:   ferdiu@users.noreply.github.com

  # Upstream repositories for version polling
  GUI_REPO:         https://github.com/geoffreybennett/alsa-scarlett-gui
  SCARLETT2_REPO:   https://github.com/geoffreybennett/scarlett2-firmware
  SCARLETT4_REPO:   https://github.com/geoffreybennett/scarlett4-firmware

  # Spec files (relative to GITHUB_WORKSPACE)
  GUI_SPEC:         alsa-scarlett-gui.spec
  SCARLETT2_SPEC:   scarlett2-firmware.spec
  SCARLETT4_SPEC:   scarlett4-firmware.spec

##############################################################################
# Job 1: Poll all three upstreams and expose their latest versions
##############################################################################
jobs:
  GetLatestVersions:
    runs-on: ubuntu-latest
    outputs:
      GUI_VERSION:  ${{ steps.versions.outputs.GUI_VERSION }}
      SCARLETT2_VERSION:  ${{ steps.versions.outputs.SCARLETT2_VERSION }}
      SCARLETT4_VERSION: ${{ steps.versions.outputs.SCARLETT4_VERSION }}

    steps:
      - name: Resolve latest upstream versions
        id: versions
        run: |
          set -euo pipefail

          latest_tag() {
            # Returns the latest semver tag from a git remote, stripping the 'v' prefix
            # NOTE: sometimes the releases have 2 numbers, other 3, lets catch both of them
            git ls-remote --tags --refs "$1" \
              | awk '{print $2}' \
              | sed 's#refs/tags/##' \
              | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$|v?[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1 \
              | sed 's/^v//'
          }

          GUI_VERSION=$(latest_tag  "${{ env.GUI_REPO }}")
          SCARLETT2_VERSION=$(latest_tag  "${{ env.SCARLETT2_REPO }}")
          SCARLETT4_VERSION=$(latest_tag "${{ env.SCARLETT4_REPO }}")

          echo "alsa-scarlett-gui  latest: $GUI_VERSION"
          echo "scarlett2-firmware  latest: $SCARLETT2_VERSION"
          echo "scarlett4-firmware latest: $SCARLETT4_VERSION"

          [ -n "$GUI_VERSION"  ] || { echo "ERROR: could not resolve alsa-scarlett-gui version";  exit 1; }
          [ -n "$SCARLETT2_VERSION"  ] || { echo "ERROR: could not resolve scarlett2-firmware version";  exit 1; }
          [ -n "$SCARLETT4_VERSION" ] || { echo "ERROR: could not resolve scarlett4-firmware version"; exit 1; }

          echo "GUI_VERSION=$GUI_VERSION"   >> "$GITHUB_OUTPUT"
          echo "SCARLETT2_VERSION=$SCARLETT2_VERSION"   >> "$GITHUB_OUTPUT"
          echo "SCARLETT4_VERSION=$SCARLETT4_VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}

##############################################################################
# Job 2: Build alsa-scarlett-gui (and its subpackages) if upstream is ahead of COPR
##############################################################################
  BuildAlsaScarlettGui:
    needs: GetLatestVersions
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}

      - name: Install dependencies
        run: dnf install -y -q copr-cli python3 git rpm-build rpmdevtools

      - name: Configure copr-cli
        run: |
          mkdir -p "$HOME/.config"
          cat > "$HOME/.config/copr" << EOF
          [copr-cli]
          login    = ${{ secrets.COPR_BUILD_L }}
          username = ${{ env.COPR_USERNAME }}
          token    = ${{ secrets.COPR_BUILD_T }}
          copr_url = ${{ env.COPR_URL }}
          EOF

      - name: Compare upstream version with COPR
        id: check_alsa-scarlett-gui
        continue-on-error: true
        run: |
          set -euo pipefail
          UPSTREAM="${{ needs.GetLatestVersions.outputs.GUI_VERSION }}"

          COPR_VERSION=$(copr-cli get-package \
            "${{ env.COPR_USERNAME }}/${{ env.COPR_PROJECT }}" \
            --name alsa-scarlett-gui \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d["latest_build"]["source_package"]["version"])' \
            2>/dev/null || echo "")

          echo "Upstream : $UPSTREAM"
          echo "COPR     : ${COPR_VERSION:-<none>}"

          # Normalise to zero-padded integers for comparison (handles x.y.z)
          norm() { echo "$1" | awk -F. '{printf "%05d%05d%05d\n", $1, $2, $3}'; }

          if [ -z "$COPR_VERSION" ] || [ "$(norm "$UPSTREAM")" -gt "$(norm "${COPR_VERSION%-*}")" ]; then
            echo "START_BUILD=true" >> "$GITHUB_ENV"
            echo "GUI_BUILD_VERSION=$UPSTREAM" >> "$GITHUB_ENV"
            echo "→ COPR build needed"
          else
            echo "START_BUILD=false" >> "$GITHUB_ENV"
            echo "→ COPR already up to date, skipping"
          fi

      - name: Patch version into spec file
        if: env.START_BUILD == 'true'
        run: |
          sed -i "s/^Version:.*/Version:        ${{ env.GUI_BUILD_VERSION }}/" \
            "$GITHUB_WORKSPACE/${{ env.GUI_SPEC }}"

      - name: Trigger COPR build for alsa-scarlett-gui
        if: env.START_BUILD == 'true'
        run: |
          echo "Downloading source..."
          spectool -g -C "$GITHUB_WORKSPACE/sources/" "$GITHUB_WORKSPACE/${{ env.GUI_SPEC }}"

          echo "Building sRPM..."
          rpmbuild -bs \
            --define "_sourcedir $GITHUB_WORKSPACE/sources" \
            --define "_specdir $GITHUB_WORKSPACE" \
            --define "_srcrpmdir $GITHUB_WORKSPACE" \
            $GITHUB_WORKSPACE/${{ env.GUI_SPEC }}

          echo "Starting COPR build for alsa-scarlett-gui ${{ env.GUI_BUILD_VERSION }}"
          copr-cli build "${{ env.COPR_PROJECT }}" $GITHUB_WORKSPACE/*.src.rpm


